server {
    listen 80;
    server_name yourdomain.com; # Replace with your domain
    root /var/www/manas/dist; # Replace with your build path
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml image/svg+xml;

    # Brotli Compression (if module is installed)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml application/json application/javascript application/rss+xml image/svg+xml;

    # Vite Hashed Assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Media Assets (Manas project specific)
    location /manas/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # SPA Routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
